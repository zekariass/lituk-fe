    <rect x="245" y="146" width="30" height="8" fill="#c9184a" rx="3"/>
    <circle cx="100" cy="152" r="22" fill="url(#wheelGrad)" filter="url(#shadow)"/>
    <circle cx="100" cy="152" r="15" fill="#343a40"/>
    <circle cx="100" cy="152" r="8" fill="#6c757d"/>
    <circle cx="100" cy="152" r="3" fill="#adb5bd"/>
    <line x1="100" y1="137" x2="100" y2="167" stroke="#adb5bd" stroke-width="1.5"/>
    <line x1="85" y1="152" x2="115" y2="152" stroke="#adb5bd" stroke-width="1.5"/>
    <line x1="89.4" y1="141.4" x2="110.6" y2="162.6" stroke="#adb5bd" stroke-width="1.5"/>
    <line x1="110.6" y1="141.4" x2="89.4" y2="162.6" stroke="#adb5bd" stroke-width="1.5"/>
    <circle cx="220" cy="152" r="22" fill="url(#wheelGrad)" filter="url(#shadow)"/>
    <circle cx="220" cy="152" r="15" fill="#343a40"/>
    <circle cx="220" cy="152" r="8" fill="#6c757d"/>
    <circle cx="220" cy="152" r="3" fill="#adb5bd"/>
