<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 72 298 114" width="298" height="114">
  <defs>
    <linearGradient id="busBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2ec4b6"/>
      <stop offset="100%" style="stop-color:#0a7373"/>
    </linearGradient>
    <linearGradient id="busRoof" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3ddbd1"/>
      <stop offset="100%" style="stop-color:#2ec4b6"/>
    </linearGradient>
    <linearGradient id="busWindow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#caf0f8;stop-opacity:0.85"/>
      <stop offset="100%" style="stop-color:#90e0ef;stop-opacity:0.65"/>
    </linearGradient>
    <linearGradient id="wheelPCV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="100%" style="stop-color:#212529"/>
    </linearGradient>
    <filter id="busShadow">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <filter id="busGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Vehicle group — mirrored horizontally -->
  <g transform="translate(320,0) scale(-1,1)">
    <ellipse cx="160" cy="160" rx="148" ry="9" fill="#000" opacity="0.4"/>

    <!-- BUS BODY -->
    <rect x="18" y="80" width="284" height="80" fill="url(#busBody)" rx="8" filter="url(#busShadow)"/>
    <rect x="20" y="74" width="280" height="14" fill="url(#busRoof)" rx="6"/>
    <rect x="18" y="124" width="284" height="10" fill="white" opacity="0.15"/>

    <!-- Destination board (blank, no text) -->
    <rect x="22" y="82" width="60" height="18" fill="#1a1a2e" rx="3"/>

    <!-- Front windshield -->
    <rect x="24" y="104" width="62" height="34" fill="url(#busWindow)" rx="4" opacity="0.9"/>
    <rect x="28" y="107" width="22" height="8" fill="white" rx="2" opacity="0.25"/>
    <line x1="28" y1="132" x2="60" y2="127" stroke="#0a7373" stroke-width="1.5"/>

    <!-- Passenger windows -->
    <rect x="100" y="88" width="32" height="26" fill="url(#busWindow)" rx="3"/>
    <rect x="101" y="89" width="14" height="8" fill="white" rx="1" opacity="0.2"/>
    <rect x="142" y="88" width="32" height="26" fill="url(#busWindow)" rx="3"/>
    <rect x="143" y="89" width="14" height="8" fill="white" rx="1" opacity="0.2"/>
    <rect x="184" y="88" width="32" height="26" fill="url(#busWindow)" rx="3"/>
    <rect x="185" y="89" width="14" height="8" fill="white" rx="1" opacity="0.2"/>
    <rect x="226" y="88" width="32" height="26" fill="url(#busWindow)" rx="3"/>
    <rect x="227" y="89" width="14" height="8" fill="white" rx="1" opacity="0.2"/>

    <!-- Rear window -->
    <rect x="268" y="88" width="28" height="50" fill="url(#busWindow)" rx="3" opacity="0.75"/>

    <!-- Door -->
    <rect x="92" y="120" width="34" height="40" fill="#0a7373" rx="3" opacity="0.9"/>
    <line x1="109" y1="120" x2="109" y2="160" stroke="#2ec4b6" stroke-width="1"/>
    <rect x="95" y="123" width="12" height="16" fill="url(#busWindow)" rx="2"/>
    <rect x="111" y="123" width="12" height="16" fill="url(#busWindow)" rx="2"/>
    <rect x="92" y="156" width="34" height="6" fill="#0a5f5f" rx="2"/>

    <!-- Front face -->
    <rect x="18" y="80" width="8" height="80" fill="#0a7373" rx="4"/>
    <rect x="18" y="104" width="18" height="12" fill="#ffd60a" rx="3" filter="url(#busGlow)"/>
    <rect x="18" y="104" width="18" height="12" fill="white" rx="3" opacity="0.35"/>
    <rect x="18" y="118" width="18" height="4" fill="white" rx="2" opacity="0.7"/>
    <path d="M18 105 L0 98 L0 114 L18 114 Z" fill="#ffd60a" opacity="0.08"/>
    <rect x="16" y="152" width="22" height="10" fill="#0a5f5f" rx="3"/>
    <rect x="18" y="154" width="18" height="6" fill="#17b2a3" rx="2" opacity="0.5"/>
    <rect x="16" y="138" width="22" height="14" fill="#0d1b2a" rx="2"/>
    <line x1="19" y1="141" x2="35" y2="141" stroke="#2ec4b6" stroke-width="0.8" opacity="0.6"/>
    <line x1="19" y1="145" x2="35" y2="145" stroke="#2ec4b6" stroke-width="0.8" opacity="0.6"/>
    <line x1="19" y1="149" x2="35" y2="149" stroke="#2ec4b6" stroke-width="0.8" opacity="0.6"/>

    <!-- Rear lights -->
    <rect x="294" y="104" width="10" height="18" fill="#e63946" rx="2"/>
    <rect x="294" y="124" width="10" height="10" fill="#ffd60a" rx="2" opacity="0.9"/>
    <rect x="294" y="136" width="10" height="16" fill="#e63946" rx="2" opacity="0.7"/>
    <rect x="290" y="152" width="12" height="10" fill="#0a5f5f" rx="3"/>

    <!-- Number plate (blank) -->
    <rect x="228" y="150" width="50" height="10" fill="white" rx="2" opacity="0.8"/>

    <!-- Mirror -->
    <rect x="6" y="100" width="14" height="9" fill="#0a7373" rx="2"/>
    <line x1="14" y1="100" x2="22" y2="95" stroke="#0a7373" stroke-width="2"/>

    <!-- WHEELS -->
    <circle cx="66" cy="158" r="24" fill="url(#wheelPCV)" filter="url(#busShadow)"/>
    <circle cx="66" cy="158" r="17" fill="#1a1a2e"/>
    <circle cx="66" cy="158" r="10" fill="#6c757d"/>
    <circle cx="66" cy="158" r="4" fill="#adb5bd"/>
    <line x1="66" y1="141" x2="66" y2="175" stroke="#adb5bd" stroke-width="1.5"/>
    <line x1="49" y1="158" x2="83" y2="158" stroke="#adb5bd" stroke-width="1.5"/>
    <line x1="54.4" y1="146.4" x2="77.6" y2="169.6" stroke="#adb5bd" stroke-width="1.5"/>
    <line x1="77.6" y1="146.4" x2="54.4" y2="169.6" stroke="#adb5bd" stroke-width="1.5"/>
    <circle cx="244" cy="158" r="24" fill="url(#wheelPCV)" filter="url(#busShadow)"/>
    <circle cx="244" cy="158" r="17" fill="#1a1a2e"/>
    <circle cx="244" cy="158" r="10" fill="#6c757d"/>
    <circle cx="244" cy="158" r="4" fill="#adb5bd"/>
    <line x1="244" y1="141" x2="244" y2="175" stroke="#adb5bd" stroke-width="1.5"/>
    <line x1="227" y1="158" x2="261" y2="158" stroke="#adb5bd" stroke-width="1.5"/>
    <line x1="232.4" y1="146.4" x2="255.6" y2="169.6" stroke="#adb5bd" stroke-width="1.5"/>
    <line x1="255.6" y1="146.4" x2="232.4" y2="169.6" stroke="#adb5bd" stroke-width="1.5"/>
  </g>
</svg>
