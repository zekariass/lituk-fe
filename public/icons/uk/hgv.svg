<svg xmlns="http://www.w3.org/2000/svg" viewBox="12 64 298 122" width="298" height="122">
  <defs>
    <linearGradient id="cab" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f77f00"/>
      <stop offset="100%" style="stop-color:#d62828"/>
    </linearGradient>
    <linearGradient id="trailer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e9ecef"/>
      <stop offset="100%" style="stop-color:#adb5bd"/>
    </linearGradient>
    <linearGradient id="windshieldHGV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90e0ef;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#0096c7;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="wheelHGV" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#495057"/>
      <stop offset="100%" style="stop-color:#212529"/>
    </linearGradient>
    <filter id="hgvShadow">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="headlightGlow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

